name: Run Unit Tests and Report Coverage

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"

      - name: Install dependencies
        working-directory: ./NodeJS/06_Testing/05_ContinuousIntegration
        run: npm ci

      - name: Run tests
        working-directory: ./NodeJS/06_Testing/05_ContinuousIntegration
        run: npm test -- --coverage 2>&1 | tee test_output.log

      - name: Comment PR
        uses: actions/github-script@v6
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const path = 'NodeJS/06_Testing/05_ContinuousIntegration/test_output.log';

            if (!fs.existsSync(path)) {
              console.log("Test output not found");
              return;
            }

            let testOutput = fs.readFileSync(path, 'utf8');

            const maxLength = 60000;
            if (testOutput.length > maxLength) {
              testOutput = testOutput.slice(0, maxLength) + "\n... (truncated)";
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Test Results\n\n\`\`\`\n${testOutput}\n\`\`\``
            });
